version: "3.9"

services:
    frontend:
        build: .
        container_name: react-dev
        working_dir: /workspace

        volumes:
            - ./app:/workspace
            - node_modules:/workspace/node_modules

        ports:
            - "5173:5173"

        environment:
            - NODE_ENV=development
            - CHOKIDAR_USEPOLLING=true

        restart: unless-stopped

        stdin_open: true
        tty: true

        command: ["bash", "/workspace/init.sh"]

volumes:
    node_modules: